<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Former Defenders</title>
  <meta name="description" content="A nationwide network of former defense attorneys. Find a recommended attorney in your state." />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <!-- ============================= HEADER ============================= -->
  <header class="site-header" id="top">
    <div class="header-inner">
      <a class="brand" href="#top" aria-label="Home">
        <img class="brand-logo" id="brandLogo" src="./site-logo.png" alt="" />
        <span class="brand-text">
          <span class="brand-name" id="brandName">Former Defenders</span>
          <span class="brand-tagline" id="brandTagline"></span>
        </span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="navLinks" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks"><!-- populated from site-branding.json --></ul>
      </nav>
    </div>
  </header>

  <main>
    <!-- ============================= HERO ============================= -->
    <section class="hero">
      <p class="hero-eyebrow" id="heroEyebrow"></p>
      <h1 class="hero-heading" id="heroHeading">Find a former defender near you.</h1>
      <p class="hero-subtext" id="heroSubtext"></p>
    </section>

    <!-- ============================= MAP ============================= -->
    <section class="map-section" aria-label="Map of recommended attorneys by state">
      <div class="map-stage">
        <div class="map-wrap" id="mapWrap">
          <div class="map-loading" id="mapLoading">Loading map&hellip;</div>
          <svg id="usMap" role="img" aria-label="Map of the continental United States. Select a state to view recommended attorneys."></svg>
        </div>

        <div class="map-tooltip" id="mapTooltip" role="status" aria-live="polite"></div>

        <ul class="map-legend" aria-hidden="false">
          <li><span class="key key-covered"></span> Attorneys available</li>
          <li><span class="key key-star">&#9733;</span> Office location</li>
          <li><span class="key key-empty"></span> No listings yet</li>
        </ul>
      </div>
    </section>

    <!-- ============================= ABOUT ============================= -->
    <section class="about" id="about">
      <div class="about-inner">
        <p class="section-eyebrow">The project</p>
        <h2 class="about-heading" id="aboutHeading">About the project</h2>
        <p class="about-body" id="aboutBody"></p>
      </div>
    </section>
  </main>

  <!-- ============================= FOOTER ============================= -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-name" id="footerName"></span>
        <p class="footer-disclaimer" id="footerDisclaimer"></p>
      </div>
      <div class="footer-contact" id="footerContact"><!-- populated from site-branding.json --></div>
    </div>
    <div class="footer-bar">
      <span id="footerCopyright"></span>
      <ul class="footer-links" id="footerLinks"></ul>
    </div>
  </footer>

  <!-- ===================== ATTORNEY POP-OUT DRAWER ===================== -->
  <div class="drawer-overlay" id="drawerOverlay" hidden></div>
  <aside class="drawer" id="drawer" aria-hidden="true" aria-labelledby="drawerTitle" role="dialog" aria-modal="true" tabindex="-1">
    <div class="drawer-head">
      <div>
        <p class="drawer-kicker" id="drawerKicker">Recommended attorneys</p>
        <h2 class="drawer-title" id="drawerTitle">State</h2>
      </div>
      <button class="drawer-close" id="drawerClose" aria-label="Close">&times;</button>
    </div>
    <div class="drawer-body" id="drawerBody"><!-- attorney cards --></div>
  </aside>

  <!-- vendored, no external CDN calls -->
  <script src="./vendor/d3.min.js"></script>
  <script src="./vendor/topojson-client.min.js"></script>
  <script src="./assets/js/main.js"></script>
</body>
</html>
